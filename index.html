<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>수입원물 관리 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --border:#30363d;
  --accent:#1f6feb; --a2:#388bfd;
  --green:#3fb950; --yellow:#d29922; --red:#f85149;
  --orange:#db6d28; --purple:#bc8cff; --cyan:#39c5cf;
  --text:#e6edf3; --t2:#8b949e; --t3:#6e7681;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh;overflow-x:hidden;}

/* HEADER */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-size:15px;font-weight:700;color:var(--a2);}
.hdr-sub{font-size:10px;color:var(--t3);margin-top:1px;}
.sync-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--t2);padding:7px 13px;font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;}
.sync-btn:active{background:var(--accent);color:#fff;}
.spin{display:inline-block;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}

/* STATUS BAR */
.status-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;}
.status-bar::-webkit-scrollbar{display:none;}
.stat-item{display:flex;align-items:center;gap:5px;white-space:nowrap;font-size:11px;}
.stat-dot{width:6px;height:6px;border-radius:50%;}

/* TABS */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 6px;position:sticky;top:88px;z-index:99;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:11px 13px;font-size:12px;font-weight:500;color:var(--t3);white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:'Noto Sans KR',sans-serif;}
.tab.on{color:var(--a2);border-bottom-color:var(--a2);}

/* CONTENT */
.content{padding:12px;}
.page{display:none;}
.page.on{display:block;}

/* LOADING */
.ldg{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:10px;}
.ldg-spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--a2);border-radius:50%;animation:rot .8s linear infinite;}
.ldg-txt{color:var(--t3);font-size:12px;}

/* CARDS */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.cg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 13px;}
.cl{font-size:10px;color:var(--t3);margin-bottom:3px;}
.cv{font-size:21px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2;}
.cs{font-size:10px;color:var(--t3);margin-top:2px;}
.cb .cv{color:var(--a2);} .cg2 .cv{color:var(--green);} .cy .cv{color:var(--yellow);}
.cr .cv{color:var(--red);} .cc .cv{color:var(--cyan);} .cp .cv{color:var(--purple);}

/* SECTION */
.stitle{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}

/* TABLE */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);margin-bottom:12px;}
table{width:100%;border-collapse:collapse;min-width:480px;}
thead{background:var(--bg3);}
th{padding:7px 9px;text-align:left;font-size:10px;font-weight:600;color:var(--t3);white-space:nowrap;border-bottom:1px solid var(--border);}
td{padding:7px 9px;border-bottom:1px solid rgba(48,54,61,.5);font-size:11px;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tbody tr:active{background:rgba(255,255,255,.03);}

/* BADGE */
.bd{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;}
.g{background:rgba(63,185,80,.15);color:var(--green);}
.y{background:rgba(210,153,34,.15);color:var(--yellow);}
.r{background:rgba(248,81,73,.15);color:var(--red);}
.b{background:rgba(56,139,253,.15);color:var(--a2);}
.c{background:rgba(57,197,207,.15);color:var(--cyan);}
.p{background:rgba(188,140,255,.15);color:var(--purple);}
.o{background:rgba(219,109,40,.15);color:var(--orange);}
.gr{background:rgba(139,148,158,.15);color:var(--t2);}

/* ALERT */
.al{border-radius:var(--r);padding:9px 12px;margin-bottom:10px;font-size:11px;display:flex;gap:7px;align-items:flex-start;}
.al-r{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.25);color:var(--red);}
.al-y{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.25);color:var(--yellow);}
.al-b{background:rgba(56,139,253,.1);border:1px solid rgba(56,139,253,.25);color:var(--a2);}
.al-g{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.25);color:var(--green);}

/* FILTER */
.fr{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.fr select,.fr input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;flex:1;min-width:100px;}
.fr input:focus,.fr select:focus{border-color:var(--a2);}

/* PAYMENT CARD */
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.pd{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--red);font-weight:700;}
.pa{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--yellow);font-weight:700;}

/* PROGRESS BAR */
.pb-t{background:var(--bg3);border-radius:4px;height:7px;overflow:hidden;margin-top:6px;}
.pb-f{height:100%;border-radius:4px;transition:width .8s;}

/* ERROR */
.err{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.2);border-radius:var(--r);padding:20px;text-align:center;margin:20px 0;}
.err h3{color:var(--red);margin-bottom:8px;}
.err p{color:var(--t3);font-size:12px;line-height:1.7;}

.mono{font-family:'JetBrains Mono',monospace;}
.tr{text-align:right;}
.mb12{margin-bottom:12px;}

/* DDAY */
.dd-over{color:var(--red);font-weight:700;}
.dd-soon{color:var(--yellow);font-weight:600;}
.dd-ok{color:var(--green);}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <div class="hdr-title">📦 수입원물 관리</div>
    <div class="hdr-sub" id="syncTime">데이터 불러오는 중...</div>
  </div>
  <button class="sync-btn" id="syncBtn" onclick="init()">
    <span id="syncIcon">🔄</span> 새로고침
  </button>
</header>

<div class="status-bar" id="statusBar">
  <div class="stat-item"><div class="stat-dot" style="background:var(--t3)"></div>로딩 중...</div>
</div>

<nav class="tabs">
  <div class="tab on" onclick="go('dashboard',this)">📊 현황</div>
  <div class="tab" onclick="go('progress',this)">🚢 진행사항</div>
  <div class="tab" onclick="go('active',this)">⚡ 진행중</div>
  <div class="tab" onclick="go('schedule',this)">📅 스케줄</div>
  <div class="tab" onclick="go('payment',this)">💳 지급일정</div>
  <div class="tab" onclick="go('gsg',this)">💰 GSG유예</div>
  <div class="tab" onclick="go('inventory',this)">🏭 창고재고</div>
  <div class="tab" onclick="go('sim',this)">🔢 시뮬레이션</div>
</nav>

<div class="content">
  <div id="page-dashboard" class="page on"><div class="ldg"><div class="ldg-spin"></div><div class="ldg-txt">구글 시트에서 실시간 데이터 불러오는 중...</div></div></div>
  <div id="page-progress" class="page"><div class="ldg"><div class="ldg-spin"></div></div></div>
  <div id="page-active" class="page"><div class="ldg"><div class="ldg-spin"></div></div></div>
  <div id="page-schedule" class="page"><div class="ldg"><div class="ldg-spin"></div></div></div>
  <div id="page-payment" class="page"><div class="ldg"><div class="ldg-spin"></div></div></div>
  <div id="page-gsg" class="page"><div class="ldg"><div class="ldg-spin"></div></div></div>
  <div id="page-inventory" class="page"><div class="ldg"><div class="ldg-spin"></div></div></div>
  <div id="page-sim" class="page"><div class="ldg"><div class="ldg-spin"></div></div></div>
</div>

<script>

// ===== CSV PARSE =====
function parseCSV(txt) {
  const rows = [];
  const lines = txt.split('\n');
  for (const line of lines) {
    const cells = []; let q=false, cell='';
    for (let i=0;i<line.length;i++) {
      const ch=line[i];
      if(ch==='"'){q=!q;}
      else if(ch===','&&!q){cells.push(cell.trim());cell='';}
      else{cell+=ch;}
    }
    cells.push(cell.trim());
    rows.push(cells);
  }
  return rows;
}


// ===== HELPERS =====
const fmt = n => {
  if(n===null||n===undefined||n===''||n==='-') return '-';
  const num=parseFloat(String(n).replace(/,/g,''));
  return isNaN(num)?n:num.toLocaleString('ko-KR');
};
const fmtB = n => {
  const num=parseFloat(String(n||0).replace(/,/g,''));
  if(isNaN(num)||num===0) return '-';
  return (Math.round(num/1e8*10)/10)+'억';
};
const fmtDate = s => {
  if(!s) return '-'; s=s.trim();
  if(s.includes('년')) return s;
  const m=s.match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
  return m?`${m[1]}.${m[2].padStart(2,'0')}.${m[3].padStart(2,'0')}`:s;
};
const dday = dateStr => {
  const m=(dateStr||'').match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
  if(!m) return null;
  const d=new Date(m[1],m[2]-1,m[3]);
  return Math.ceil((d-new Date())/86400000);
};
const ddBadge = dd => {
  if(dd===null) return '-';
  if(dd<0) return `<span class="bd r">D+${Math.abs(dd)}</span>`;
  if(dd<=7) return `<span class="bd r">D-${dd}</span>`;
  if(dd<=14) return `<span class="bd y">D-${dd}</span>`;
  return `<span class="bd g">D-${dd}</span>`;
};
const sBadge = s => {
  if(!s||s==='-') return '<span class="bd gr">-</span>';
  if(s.includes('완료')) return '<span class="bd g">완료</span>';
  if(s.includes('수입대기')) return '<span class="bd y">수입대기</span>';
  if(s.includes('창고')) return '<span class="bd b">창고</span>';
  if(s.includes('사용중')) return '<span class="bd c">사용중</span>';
  if(s.includes('입항중')) return '<span class="bd p">입항중</span>';
  if(s.includes('정밀')) return '<span class="bd r">정밀</span>';
  if(s.includes('대기중')) return '<span class="bd o">대기중</span>';
  return `<span class="bd gr">${s}</span>`;
};
const bBadge = b => {
  if(!b||!b.trim()) return '-';
  const mp={BRF:'g',SEARA:'o','C-Vale':'c',AURORA:'b',SAO:'y',GT:'gr',VIBRA:'gr',LEVO:'p','SEARA(유예분)':'o',BETAGRO:'y',KAONA:'c',PANUS:'b',TFG:'g',TPG:'gr'};
  return `<span class="bd ${mp[b.trim()]||'gr'}">${b.trim()}</span>`;
};

// ===== INIT =====
function init() {
  const btn=document.getElementById('syncBtn');
  const icon=document.getElementById('syncIcon');
  btn.disabled=true; icon.className='spin'; icon.textContent='⏳';

  document.getElementById('page-dashboard').innerHTML='<div class="ldg"><div class="ldg-spin"></div><div class="ldg-txt">구글 시트에서 데이터 불러오는 중...</div></div>';

  google.script.run
    .withSuccessHandler(function(data) {
      if (!data || !data.success) {
        showErr('page-dashboard', '데이터 로드 실패', data ? data.error : '알 수 없는 오류');
        btn.disabled=false; icon.className=''; icon.textContent='🔄';
        return;
      }

      // 2차원 배열을 그대로 사용 (Apps Script는 이미 배열로 반환)
      D = {
        진행: data['진행사항']||[],
        리스트: data['리스트']||[],
        스케줄: data['스케줄']||[],
        하이웍스: data['하이웍스']||[],
        현황표: data['현황표']||[],
        수급계획: data['수급계획']||[],
        gsg시뮬: data['gsg']||[],
        재고: data['재고']||[],
      };

      // 디버그: 데이터 확인
      console.log('데이터 로드 완료:', {
        진행: D.진행 ? D.진행.length + '행' : '없음',
        리스트: D.리스트 ? D.리스트.length + '행' : '없음',
        gsg시뮬: D.gsg시뮬 ? D.gsg시뮬.length + '행' : '없음',
        재고: D.재고 ? D.재고.length + '행' : '없음',
      });

      document.getElementById('syncTime').textContent = data.timestamp + ' 동기화 완료';
      renderAll();
      renderStatusBar();
      btn.disabled=false; icon.className=''; icon.textContent='🔄';
    })
    .withFailureHandler(function(e) {
      showErr('page-dashboard', '서버 오류', e.message||e);
      btn.disabled=false; icon.className=''; icon.textContent='🔄';
    })
    .getAllData();
}

function showErr(pid, title, msg) {
  document.getElementById(pid).innerHTML=`
    <div class="err"><h3>⚠️ ${title}</h3>
    <p>구글 시트 공유 설정을 확인해주세요.<br>
    "링크가 있는 모든 사용자 → 뷰어" 필요<br><br>
    <span style="color:var(--red);font-size:10px;">${msg||''}</span></p></div>`;
}

function renderAll() {
  renderDashboard();
  renderProgress();
  renderActive();
  renderSchedule();
  renderPayment();
  renderGSG();
  renderInventory();
  renderSim();
}

// ===== STATUS BAR =====
function renderStatusBar() {
  const rows = getProgressRows();
  const done = rows.filter(r=>(r[14]||'').includes('완료')).length;
  const waiting = rows.filter(r=>(r[14]||'').includes('수입대기')).length;
  const arriving = rows.filter(r=>(r[14]||'').includes('입항중')).length;
  const urgent = rows.filter(r=>{const dd=dday(r[5]);return dd!==null&&dd<=7&&!(r[14]||'').includes('완료');}).length;
  document.getElementById('statusBar').innerHTML=`
    <div class="stat-item"><div class="stat-dot" style="background:var(--green)"></div>완료 ${done}건</div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--yellow)"></div>수입대기 ${waiting}건</div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--purple)"></div>입항중 ${arriving}건</div>
    ${urgent>0?`<div class="stat-item"><div class="stat-dot" style="background:var(--red)"></div><b style="color:var(--red)">D-7이내 ${urgent}건</b></div>`:''}
  `;
}

// ===== GET PROGRESS ROWS =====
function getProgressRows() {
  if(!D.진행||!D.진행.length) return [];
  return D.진행.slice(3).filter(r=>r[2]&&r[2].trim()&&r[3]&&r[3].trim());
}

// ===== DASHBOARD =====
function renderDashboard() {
  const rows = getProgressRows();
  if(!rows.length){ showErr('page-dashboard','진행사항 로드 실패','시트 공유 확인'); return; }

  const total=rows.length;
  const done=rows.filter(r=>(r[14]||'').includes('완료')).length;
  const ip=rows.filter(r=>{const s=r[14]||'';return s.includes('수입대기')||s.includes('창고')||s.includes('사용중')||s.includes('대기중')||s.includes('정밀');}).length;
  const arr=rows.filter(r=>(r[14]||'').includes('입항중')).length;
  const pct=Math.round(done/total*100);

  // 브랜드별
  const bmap={};
  rows.forEach(r=>{
    const b=(r[3]||'').trim(); if(!b) return;
    if(!bmap[b]){bmap[b]={완:0,진:0,합:0};}
    bmap[b].합++;
    if((r[14]||'').includes('완료')) bmap[b].완++; else bmap[b].진++;
  });

  // 이번달 지급 긴급 건
  const now=new Date();
  const urgent=rows.filter(r=>{const dd=dday(r[5]);return dd!==null&&dd<=14&&!(r[14]||'').includes('완료');});

  document.getElementById('page-dashboard').innerHTML=`
    ${urgent.length>0?`<div class="al al-r">⚠️ 지급기한 D-14 이내 ${urgent.length}건 — 지급일정 탭 확인 요망</div>`:''}
    <div class="cg">
      <div class="card cb"><div class="cl">총 컨테이너</div><div class="cv">${total}</div><div class="cs">전체 진행 건수</div></div>
      <div class="card cg2"><div class="cl">완료</div><div class="cv">${done}</div><div class="cs">출고 완료</div></div>
      <div class="card cy"><div class="cl">진행중</div><div class="cv">${ip}</div><div class="cs">수입대기/창고 등</div></div>
      <div class="card cp"><div class="cl">입항중</div><div class="cv">${arr}</div><div class="cs">도착 대기</div></div>
    </div>

    <div class="card mb12">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:11px;color:var(--t3);">전체 진행률</span>
        <span class="mono" style="font-size:12px;color:var(--green);">${done} / ${total} (${pct}%)</span>
      </div>
      <div class="pb-t"><div class="pb-f" style="width:${pct}%;background:var(--green);"></div></div>
    </div>

    <div class="stitle">브랜드별 현황</div>
    <div class="tw">
      <table>
        <thead><tr><th>브랜드</th><th>완료</th><th>진행</th><th>합계</th><th>완료율</th></tr></thead>
        <tbody>
          ${Object.entries(bmap).sort((a,b)=>b[1].합-a[1].합).map(([b,d])=>`
            <tr>
              <td>${bBadge(b)}</td>
              <td class="mono" style="color:var(--green);">${d.완}</td>
              <td class="mono" style="color:var(--yellow);">${d.진}</td>
              <td class="mono" style="font-weight:700;">${d.합}</td>
              <td style="min-width:70px;">
                <div class="pb-t" style="height:5px;">
                  <div class="pb-f" style="width:${Math.round(d.완/d.합*100)}%;background:var(--green);"></div>
                </div>
                <div style="font-size:9px;color:var(--t3);margin-top:2px;">${Math.round(d.완/d.합*100)}%</div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>

    ${urgent.length>0?`
    <div class="stitle">⚠️ 긴급 — D-14 이내 지급기한</div>
    <div class="tw">
      <table>
        <thead><tr><th>브랜드</th><th>B/L</th><th>지급기한</th><th>D-day</th><th>상황</th></tr></thead>
        <tbody>
          ${urgent.map(r=>{const dd=dday(r[5]);return`
            <tr>
              <td>${bBadge(r[3])}</td>
              <td class="mono" style="font-size:10px;">${(r[9]||'').trim()}</td>
              <td class="mono" style="font-size:10px;color:var(--red);">${fmtDate(r[5])}</td>
              <td>${ddBadge(dd)}</td>
              <td>${sBadge(r[14])}</td>
            </tr>`}).join('')}

function calcSim(){
  const sl=parseFloat(document.getElementById('ss')?.value)||19;
  const ws=parseFloat(document.getElementById('sw')?.value)||12.8;
  const stock=parseFloat(document.getElementById('sk')?.value)||46;
  const ins=[
    parseFloat(document.getElementById('si2')?.value)||0,
    parseFloat(document.getElementById('si3')?.value)||0,
    parseFloat(document.getElementById('si4')?.value)||0,
    parseFloat(document.getElementById('si5')?.value)||0,
    0,0
  ];
  const mons=['2월','3월','4월','5월','6월','7월'];
  const use=sl+ws;
  let cur=stock, rows='', shortage=false;
  mons.forEach((m,i)=>{
    const inp=ins[i]||0;
    const end=+(cur+inp-use).toFixed(1);
    if(end<0) shortage=true;
    const col=end<0?'var(--red)':end<10?'var(--yellow)':'var(--green)';
    const lbl=end<0?'⚠️ 부족':end<10?'주의':'양호';
    const bc=end<0?'r':end<10?'y':'g';
    rows+=`<tr>
      <td style="font-weight:600;">${m}</td>
      <td class="mono tr">${cur.toFixed(1)}</td>
      <td class="mono tr" style="color:var(--green);">${inp.toFixed(1)}</td>
      <td class="mono tr" style="color:var(--yellow);">${use.toFixed(1)}</td>
      <td class="mono tr" style="font-weight:700;color:${col};">${end.toFixed(1)}</td>
      <td><span class="bd ${bc}">${lbl}</span></td>
    </tr>`;
    cur=end;
  });
  const el=document.getElementById('sim-res');
  if(!el) return;
  el.innerHTML=`
    <div class="al ${shortage?'al-r':'al-g'}">${shortage?'⚠️ 재고 부족 월 발생 — 추가 발주 필요!':'✅ 현재 발주 계획으로 전 기간 재고 충분'}</div>
    <div class="tw"><table>
      <thead><tr><th>월</th><th>기초재고</th><th>입항</th><th>사용</th><th>기말재고</th><th>상태</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="al al-b" style="margin-top:8px;">💡 월 총 사용 = SL가공 ${sl} + 도매 ${ws} = <b>${use.toFixed(1)}컨</b></div>
  `;
}

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  el.classList.add('on');
}

// ===== START =====
window.addEventListener('DOMContentLoaded',()=>{
  init();
  // 10분마다 자동 새로고침
  setInterval(init, 10*60*1000);
});
</script>
</body>
</html>
