<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>수입원물 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f5;--bg2:#fff;--bg3:#f6f8fa;--bdr:#d0d7de;
  --blue:#0969da;--green:#1a7f37;--yellow:#9a6700;--red:#cf222e;
  --orange:#bc4c00;--purple:#6639ba;--cyan:#0550ae;
  --text:#1f2328;--t2:#57606a;--t3:#8c959f;--r:10px;
  --sh:0 1px 4px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5}
.hdr{background:var(--bg2);border-bottom:2px solid var(--bdr);padding:10px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh)}
.hdr-title{font-size:15px;font-weight:700;color:var(--blue)}
.hdr-sub{font-size:10px;color:var(--t3);margin-top:1px}
.badge{background:#ddf4ff;border:1px solid #54aeff;border-radius:20px;color:var(--blue);padding:4px 12px;font-size:10px;font-weight:600}
.sbar{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:6px 16px;display:flex;gap:16px;overflow-x:auto;scrollbar-width:none}
.sbar::-webkit-scrollbar{display:none}
.si{display:flex;align-items:center;gap:5px;white-space:nowrap;font-size:11px;color:var(--t2)}
.dot{width:7px;height:7px;border-radius:50%}
.tabs{background:var(--bg2);border-bottom:2px solid var(--bdr);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 8px;position:sticky;top:88px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 13px;font-size:12px;font-weight:500;color:var(--t3);white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:700}
.cnt{padding:14px}
.page{display:none}.page.on{display:block}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.cg3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.cg4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:13px 14px;box-shadow:var(--sh)}
.cl{font-size:10px;color:var(--t3);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.cv{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2}
.cs{font-size:10px;color:var(--t3);margin-top:3px}
.c-blue .cv{color:var(--blue)}.c-green .cv{color:var(--green)}.c-yellow .cv{color:var(--yellow)}.c-red .cv{color:var(--red)}.c-purple .cv{color:var(--purple)}.c-cyan .cv{color:var(--cyan)}
.stitle{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid var(--bdr)}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr);margin-bottom:14px;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;min-width:500px;background:var(--bg2)}
thead{background:var(--bg3)}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--t2);white-space:nowrap;border-bottom:2px solid var(--bdr);cursor:pointer;user-select:none}
th:hover{background:#eef1f4;color:var(--blue)}
th.asc,th.desc{color:var(--blue);background:#f0f7ff}
td{padding:7px 10px;border-bottom:1px solid #f0f2f5;font-size:11px;white-space:nowrap}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:#f6f8fa}
.bd{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.bg{background:#dafbe1;color:#1a7f37}.by{background:#fff8c5;color:#9a6700}.br{background:#ffebe9;color:#cf222e}
.bb{background:#ddf4ff;color:#0969da}.bc{background:#ddf4ff;color:#0550ae}.bp{background:#fbefff;color:#6639ba}
.bo{background:#fff1e5;color:#bc4c00}.bgr{background:#f6f8fa;color:#57606a}
.al{border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:11px;display:flex;gap:8px}
.al-r{background:#ffebe9;border:1px solid #ffcecb;color:var(--red)}
.al-y{background:#fff8c5;border:1px solid #e3b341;color:var(--yellow)}
.al-b{background:#ddf4ff;border:1px solid #54aeff;color:var(--blue)}
.al-g{background:#dafbe1;border:1px solid #4ac26b;color:var(--green)}
.fr{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
select,input[type=text]{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;color:var(--text);padding:7px 11px;font-size:12px;outline:none;flex:1;min-width:100px}
select:focus,input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(9,105,218,.1)}
input[type=number]{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;color:var(--text);padding:8px 11px;font-size:14px;font-family:'JetBrains Mono',monospace;outline:none;width:100%}
input[type=number]:focus{border-color:var(--blue)}
.pb{background:#e1e4e8;border-radius:4px;height:7px;overflow:hidden;margin-top:6px}
.pbf{height:100%;border-radius:4px;transition:width .8s}
.mono{font-family:'JetBrains Mono',monospace}
.tr{text-align:right}
.mb14{margin-bottom:14px}
.tfoot{background:#f6f8fa;font-weight:700;border-top:2px solid var(--bdr)}
.editable{border:1px solid transparent;border-radius:4px;padding:2px 6px;display:inline-block;min-width:36px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px}
.editable:focus{outline:none;border-color:var(--blue);background:var(--bg2)}
.btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;margin-bottom:12px}
.btn:hover{background:#0550ae}
.col-hi td{background:#fffbdd !important}
.col-hi-hdr{background:#fff3b0 !important;color:#9a6700 !important}
</style>
</head>

<script>

const RAW = JSON.parse(atob(document.getElementById('jdata').textContent));
const 진행 = RAW['진행사항'];
const 리스트 = RAW['리스트'];
const GSG = RAW['gsg'];
const 수급 = RAW['수급계획'];
const 재고 = RAW['재고'];
let 수급편집 = JSON.parse(JSON.stringify(수급));
let gsgSelCol = -1;

// ── HELPERS ──────────────────────────────
const fmt = v => {
  if (!v && v !== 0) return '-';
  const n = parseFloat(String(v).replace(/,/g,''));
  return isNaN(n) ? v : n.toLocaleString('ko-KR');
};
const fmtB = v => {
  const n = parseFloat(String(v||0).replace(/,/g,''));
  if (!n) return '-';
  return (Math.round(n/1e8*10)/10) + '억';
};
const fmtD = s => {
  if (!s) return '-';
  const m = s.match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
  return m ? m[1]+'.'+m[2].padStart(2,'0')+'.'+m[3].padStart(2,'0') : s;
};
const dday = s => {
  const m = (s||'').match(/(\d{4})[-./](\d{1,2})[-./](\d{1,2})/);
  if (!m) return null;
  return Math.ceil((new Date(+m[1],+m[2]-1,+m[3]) - new Date()) / 86400000);
};
const ddBadge = dd => {
  if (dd === null) return '-';
  if (dd < 0) return '<span class="bd br">D+' + Math.abs(dd) + '</span>';
  if (dd <= 7) return '<span class="bd br">D-' + dd + '</span>';
  if (dd <= 14) return '<span class="bd by">D-' + dd + '</span>';
  return '<span class="bd bg">D-' + dd + '</span>';
};
const sBadge = s => {
  if (!s) return '<span class="bd bgr">-</span>';
  if (s.includes('완료')) return '<span class="bd bg">완료</span>';
  if (s.includes('수입대기')) return '<span class="bd by">수입대기</span>';
  if (s.includes('창고')) return '<span class="bd bb">창고</span>';
  if (s.includes('사용중')) return '<span class="bd bc">사용중</span>';
  if (s.includes('입항중')) return '<span class="bd bp">입항중</span>';
  if (s.includes('정밀')) return '<span class="bd br">정밀</span>';
  if (s.includes('대기')) return '<span class="bd bo">대기</span>';
  return '<span class="bd bgr">' + s + '</span>';
};
const BMAP = {BRF:'bg',SEARA:'bo','C-Vale':'bc',AURORA:'bb',SAO:'by',GT:'bgr',VIBRA:'bgr',LEVO:'bp',BETAGRO:'by',KAONA:'bc',PANUS:'bb',TFG:'bg',TPG:'bgr','PAIROJ POULTRY':'bgr'};
const bBadge = b => {
  if (!b || !b.trim()) return '-';
  return '<span class="bd ' + (BMAP[b.trim()]||'bgr') + '">' + b.trim() + '</span>';
};
const N = n => parseFloat(String(n||0).replace(/,/g,'')) || 0;

// ── SORT ─────────────────────────────────
const sortState = {};
function thClick(el) {
  const tblId = el.dataset.tbl;
  const ci = parseInt(el.dataset.col);
  const num = el.dataset.num === '1';
  const key = tblId + '_' + ci;
  const dir = sortState[key] === 'asc' ? 'desc' : 'asc';
  for (const k in sortState) { if (k.startsWith(tblId + '_')) delete sortState[k]; }
  sortState[key] = dir;
  const tbl = document.getElementById(tblId);
  if (!tbl) return;
  tbl.querySelectorAll('thead th').forEach((t,i) => {
    t.classList.remove('asc','desc');
    if (i === ci) t.classList.add(dir);
  });
  const tbody = tbl.querySelector('tbody');
  const rows = [...tbody.querySelectorAll('tr:not(.tfoot)')];
  rows.sort((a,b) => {
    let av = (a.cells[ci]?.textContent||'').trim();
    let bv = (b.cells[ci]?.textContent||'').trim();
    if (num) {
      av = parseFloat(av.replace(/[^0-9.-]/g,'')) || 0;
      bv = parseFloat(bv.replace(/[^0-9.-]/g,'')) || 0;
      return dir === 'asc' ? av - bv : bv - av;
    }
    return dir === 'asc' ? av.localeCompare(bv,'ko') : bv.localeCompare(av,'ko');
  });
  rows.forEach(r => tbody.appendChild(r));
}
function th(id, i, num) {
  return 'data-tbl="'+id+'" data-col="'+i+'" data-num="'+(num?'1':'0')+'" onclick="thClick(this)"';
}

// ── STATUS BAR ────────────────────────────
function renderSbar() {
  const done = 진행.filter(r=>r[14]==='완료').length;
  const ip = 진행.filter(r=>r[14]&&r[14]!=='완료').length;
  const arr = 진행.filter(r=>r[14]==='입항중').length;
  const urg = 진행.filter(r=>{ const d=dday(r[5]); return d!==null&&d<=7&&r[14]!=='완료'; }).length;
  document.getElementById('sbar').innerHTML =
    '<div class="si"><div class="dot" style="background:var(--green)"></div>완료 '+done+'건</div>'+
    '<div class="si"><div class="dot" style="background:var(--yellow)"></div>진행 '+ip+'건</div>'+
    '<div class="si"><div class="dot" style="background:var(--purple)"></div>입항중 '+arr+'건</div>'+
    (urg ? '<div class="si"><div class="dot" style="background:var(--red)"></div><b style="color:var(--red)">🚨 D-7이내 '+urg+'건</b></div>' : '');
}

// ── DASHBOARD ─────────────────────────────
function renderDash() {
  const total=진행.length, done=진행.filter(r=>r[14]==='완료').length, ip=total-done;
  const arr=진행.filter(r=>r[14]==='입항중').length;
  const pct=Math.round(done/total*100);
  const bmap={};
  진행.forEach(r=>{ const b=(r[3]||'').trim(); if(!b)return; if(!bmap[b])bmap[b]={완:0,진:0}; bmap[b][r[14]==='완료'?'완':'진']++; });
  const urg=진행.filter(r=>{ const d=dday(r[5]); return d!==null&&d<=14&&r[14]!=='완료'; });
  let h = (urg.length ? '<div class="al al-r">⚠️ 지급기한 D-14 이내 <b>'+urg.length+'건</b> 즉시 확인 요망</div>' : '');
  h += '<div class="cg4">' +
    '<div class="card c-blue"><div class="cl">총 컨테이너</div><div class="cv">'+total+'</div><div class="cs">전체</div></div>' +
    '<div class="card c-green"><div class="cl">완료</div><div class="cv">'+done+'</div><div class="cs">'+pct+'%</div></div>' +
    '<div class="card c-yellow"><div class="cl">진행중</div><div class="cv">'+ip+'</div><div class="cs">미완료</div></div>' +
    '<div class="card c-purple"><div class="cl">입항중</div><div class="cv">'+arr+'</div><div class="cs">도착대기</div></div>' +
    '</div>';
  h += '<div class="card mb14"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:11px;color:var(--t2);font-weight:600">전체 진행률</span><span class="mono" style="font-size:13px;color:var(--green);font-weight:700">'+done+' / '+total+' ('+pct+'%)</span></div><div class="pb"><div class="pbf" style="width:'+pct+'%;background:var(--green)"></div></div></div>';
  h += '<div class="stitle">브랜드별 현황</div><div class="tw"><table id="t-brand"><thead><tr>'+
    '<th '+th('t-brand',0,0)+'>브랜드 '+'↕</th>'+
    '<th '+th('t-brand',1,1)+' style="text-align:right">완료 ↕</th>'+
    '<th '+th('t-brand',2,1)+' style="text-align:right">진행 ↕</th>'+
    '<th '+th('t-brand',3,1)+' style="text-align:right">합계 ↕</th>'+
    '<th>완료율</th></tr></thead><tbody>';
  Object.entries(bmap).sort((a,b)=>(b[1].완+b[1].진)-(a[1].완+a[1].진)).forEach(([b,d])=>{
    const tot=d.완+d.진, p=Math.round(d.완/tot*100);
    h += '<tr><td>'+bBadge(b)+'</td><td class="mono" style="text-align:right;color:var(--green)">'+d.완+'</td><td class="mono" style="text-align:right;color:var(--yellow)">'+d.진+'</td><td class="mono" style="text-align:right;font-weight:700">'+tot+'</td><td style="min-width:80px"><div class="pb" style="height:5px"><div class="pbf" style="width:'+p+'%;background:var(--green)"></div></div><div style="font-size:9px;color:var(--t3);margin-top:2px">'+p+'%</div></td></tr>';
  });
  h += '</tbody></table></div>';

  const ws=N(document.getElementById('sw')?.value)||12.8;
  const st=N(document.getElementById('sk')?.value)||46;
  const ins=[N(document.getElementById('si2')?.value),N(document.getElementById('si3')?.value),N(document.getElementById('si4')?.value),N(document.getElementById('si5')?.value),N(document.getElementById('si6')?.value),0];
  const use=sl+ws;
  const mons=['2월','3월','4월','5월','6월','7월'];
  let cur=st, rows='', shortage=false;
  mons.forEach(function(m,i){
    const inp=ins[i]||0, end=+(cur+inp-use).toFixed(1);
    if(end<0) shortage=true;
    const col=end<0?'var(--red)':end<10?'var(--yellow)':'var(--green)';
    const cls=end<0?'br':end<10?'by':'bg';
    rows+='<tr><td style="font-weight:600">'+m+'</td><td class="mono tr">'+cur.toFixed(1)+'</td><td class="mono tr" style="color:var(--green)">+'+inp.toFixed(1)+'</td><td class="mono tr" style="color:var(--red)">-'+use.toFixed(1)+'</td><td class="mono tr" style="font-weight:700;color:'+col+'">'+end.toFixed(1)+'</td><td><span class="bd '+cls+'">'+(end<0?'⚠️ 부족':end<10?'⚠️ 주의':'✅ 양호')+'</span></td></tr>';
    cur=end;
  });
  const el=document.getElementById('sim-r');
  if(!el) return;
  el.innerHTML=
    '<div class="al '+(shortage?'al-r':'al-g')+' mb14">'+(shortage?'⚠️ 재고 부족 발생! 추가 발주 필요':'✅ 현재 계획으로 재고 충분')+'</div>'+
    '<div class="tw"><table><thead><tr>'+['월','기초(컨)','입항','사용','기말','상태'].map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<div class="al al-b">💡 월 총사용 = SL가공 '+sl.toFixed(1)+' + 도매 '+ws.toFixed(1)+' = <b>'+use.toFixed(1)+'컨/월</b></div>';
}

// ── TAB ───────────────────────────────────
const RENDERS = {dash:renderDash,prog:renderProg,active:renderActive,sch:renderSch,pay:renderPay,gsg:renderGSG,inv:renderInv,sim:renderSim};
function go(name, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  el.classList.add('on');
  if (RENDERS[name]) RENDERS[name]();
}

// ── INIT ──────────────────────────────────
renderSbar();
renderDash();

</script>
</body>
</html>
